---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: actions-runners
  namespace: gha
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: actions-runners
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: actions-runners
    namespace: gha
---
apiVersion: talos.dev/v1alpha1
kind: ServiceAccount
metadata:
  name: actions-runners
  namespace: gha
spec:
  roles:
    - os:admin