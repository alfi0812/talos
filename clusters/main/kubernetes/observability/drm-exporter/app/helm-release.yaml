apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: drm-exporter
  namespace: drm-exporter
spec:
  interval: 5m
  chart:
    spec:
      chart: drm-exporter
      version: 0.2.5
      sourceRef:
        kind: HelmRepository
        name: home-operations
        namespace: flux-system
      interval: 5m
  install:
    createNamespace: true
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    securityContext:
      capabilities:
        add:
          - PERFMON
    dra:
      enabled: true
      deviceClassName: "gpu.intel.com"
    monitoring:
      serviceMonitor:
        enabled: true
      dashboards:
        enabled: true
    resources:
      requests:
        cpu: 10m
      limits:
        memory: 128Mi